name: Build CompressX APK

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK & Signed Release
    runs-on: ubuntu-latest

    env:
      KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CompressX-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Decode keystore
        if: env.KEYSTORE_B64 != ''
        run: echo "$KEYSTORE_B64" | base64 --decode > ${{ runner.temp }}/compressx-release.jks

      - name: Build signed release APK
        if: env.KEYSTORE_B64 != ''
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/compressx-release.jks
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload signed release APK
        if: env.KEYSTORE_B64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: CompressX-release-${{ github.sha }}
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Build signed release AAB
        if: env.KEYSTORE_B64 != ''
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/compressx-release.jks
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload signed release AAB
        if: env.KEYSTORE_B64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: CompressX-release-aab-${{ github.sha }}
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Build unsigned release AAB (no keystore)
        if: env.KEYSTORE_B64 == ''
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload unsigned release AAB
        if: env.KEYSTORE_B64 == ''
        uses: actions/upload-artifact@v4
        with:
          name: CompressX-release-aab-unsigned-${{ github.sha }}
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
